name: rivendell
description: Rivendell — an offline-first GPA review pipeline for learners of Uzbek.
publish_to: 'none'
version: 0.1.1+2

environment:
  sdk: ^3.12.0

# Pinned matrix — source of truth: plan.md → "Reconciled dependency matrix".
# Domain packages (drift, audio, anki, pollinations, smtp, charts, notifications) land
# with the milestones that need them (T0.2+, T1.x, T4.x, T6.x). Re-pin only if a
# resolution fails the gate, and record the bump in the PR.
dependencies:
  flutter:
    sdk: flutter

  # State + DI / routing / models — core baseline (T0.1).
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.0.0
  freezed_annotation: ^3.0.0
  go_router: ^16.0.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  meta: ^1.16.0
  riverpod_annotation: 4.0.3
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  sqlcipher_flutter_libs: ^0.7.0+eol
  flutter_secure_storage: ^10.3.1
  path_provider: ^2.1.6
  path: ^1.9.1
  connectivity_plus: ^7.2.0
  workmanager: ^0.9.0+3
  # Audio playback + background media session (T1.5, FR-1.1.4 / NFR-2.2.2).
  # just_audio = engine; audio_service = background + lock-screen + focus.
  just_audio: ^0.9.43
  audio_service: ^0.18.17
  # Microphone capture → temp file (T2.7, FR-1.1.3). AAC/M4A to match the
  # indexed format; the SAF writer lifts the temp file into the folder.
  record: ^7.1.1
  # AI concept-image generation (T4.3, FR-1.3.4). http = Pollinations REST client;
  # crypto = stable per-word cache filename (sha1) so any Uzbek script hashes
  # collision-free without stripping diacritics.
  http: ^1.2.0
  crypto: ^3.0.3
  # Scheduled task reminders that fire when the app is closed (T5.3, FR-1.4.2).
  # flutter_local_notifications = display + AlarmManager-backed scheduling; the
  # transitive timezone package converts a local fire instant to a TZ instant
  # without a separate flutter_timezone dependency.
  flutter_local_notifications: ^22.0.1
  # timezone is a transitive dep of flutter_local_notifications but the gateway
  # imports it directly to convert a local fire instant to a TZDateTime, so it
  # is declared here too (T5.3).
  timezone: ^0.11.1
  # Native charts for the analytics dashboard (T6.3, FR-1.5.2).
  fl_chart: ^0.71.0
  mailer: ^7.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Codegen — pairs move in lockstep with their runtime package.
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  riverpod_generator: 4.0.4

  # Test doubles + lint surface.
  mocktail: ^1.0.4
  very_good_analysis: ^7.0.0
  drift_dev: ^2.34.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

# App launcher icon (FR-adjacent brand identity). Source PNG lives at the repo
# app root (app/rivendell.png) and is full-bleed teal (#00897B) with a white
# tree-in-speech-bubble mark. The adaptive background reuses that same teal so
# the system-applied mask (circle/squircle/etc. on API 26+) reads as seamless
# with the legacy square icon; the foreground is the same image, which
# flutter_launcher_icons insets so the tree survives the ~25% edge clip.
# Regenerate after editing the source: `dart run flutter_launcher_icons`.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "rivendell.png"
  min_sdk_android: 26
  adaptive_icon_background: "#00897B"
  adaptive_icon_foreground: "rivendell.png"
